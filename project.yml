name: IDKPlay
options:
  bundleIdPrefix: com.idkplay
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  IDKPlay:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.idkplay.IDKPlay
        PRODUCT_NAME: IDKPlay
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: IDKPlay.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: IDK Play
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  IDKPlayTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: IDKPlay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.idkplay.IDKPlayTests
        GENERATE_INFOPLIST_FILE: YES
  IDKPlayUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: IDKPlay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.idkplay.IDKPlayUITests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  IDKPlay:
    build:
      targets:
        IDKPlay: all
        IDKPlayTests: [test]
        IDKPlayUITests: [test]
    test:
      targets:
        - IDKPlayTests
        - IDKPlayUITests
    run:
      config: Debug
